name: Stock Alert System

on:
  schedule:
    - cron: '15 12 * * 1-5'
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-stock-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install -r requirements.txt

      - name: Run stock scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HOUR=$(date -u +"%H")
          if [ "$HOUR" = "12" ]; then
            SCAN_MODE=premarket python main.py
          else
            SCAN_MODE=eod python main.py
          fi

      - name: Save alert memory
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add alerts_sent.txt signals.csv
          git commit -m "Update alert memory" || echo "No changes to commit"
          git push
